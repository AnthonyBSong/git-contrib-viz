name: Build and commit action bundle

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'package.json'
      - 'action.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Bundle action
        run: npm run bundle

      - name: Commit dist/index.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || (git commit -m "chore: rebuild action bundle [skip ci]" && git push)
